app:
  name: "NAP Files-Sorter"
  version: "1.0.0"
  description: "AI Autonomous Agent for File Management"

monitoring:
  mode: "interval"
  workspace_dir: "./workspace"
  poll_interval: 3600
  dry_run: false
  recursive: false
  debounce_seconds: 2
  ignore_existing_categories: true
  ignored_filenames: [".keep", "desktop.ini"]
  ignored_patterns: ["~$*", "*.tmp", "*.temp", "*.crdownload", "*.part"]
  destination_aliases:
    "Universidad y Estudio": "1. Universidad y Estudio"
    "Software y Herramientas": "2. Software y Herramientas"
    "Juegos y Emulacion": "3. Juegos y Emulacion"
    "Multimedia": "4. Multimedia"
    "Trabajo y Empleo": "5. Trabajo y Empleo"
    "Documentos Personales": "6. Documentos Personales"
    "Varios": "7. Varios"

database:
  sqlite_path: "./db/nap.db"

llm:
  groq_model: "llama-3.3-70b-versatile"
  gemini_model: "gemini-2.5-flash"
  temperature: 0.2

rules:
  fallback_documents_to_varios: false
  ambiguous_document_fallback_category: "Varios/Documentos por Revisar"

processing:
  max_workers: 2
  max_files_per_cycle: 500
  llm_batch_size: 50
  llm_individual_threshold: 6
  llm_bulk_content_max_chars: 700
  llm_individual_content_max_chars: 3000
  local_context_min_confidence: 0.84
  varios_min_confidence: 0.82
  llm_timeout_seconds: 60
  error_retry_seconds: 60
  circuit_breaker_threshold: 3
  circuit_breaker_recovery_seconds: 60
  groq_circuit_recovery_seconds: 65
  gemini_circuit_recovery_seconds: 65
  groq_daily_circuit_recovery_seconds: 3600
  gemini_daily_circuit_recovery_seconds: 3600
  decision_cache_size: 200
  decision_cache_ttl_seconds: 3600

parsing:
  max_chars: 3000

